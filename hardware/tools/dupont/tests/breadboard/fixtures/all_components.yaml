# Fixture that exercises every supported component kind.
# One instance of each kind, placed on non-overlapping holes.
# Board is 25 columns wide to give all components room.

title: All components fixture
breadboard:
  columns: 25

components:
  - kind: resistor
    ref: R1
    value: "220"
    legs: ["A2", "A4"]

  - kind: led
    ref: D1
    color: red
    legs: ["B2", "B4"]

  - kind: led-rgb
    ref: D2
    common: cathode
    legs:
      R: "C2"
      K: "C3"
      G: "C4"
      B: "C5"

  - kind: capacitor
    ref: C1
    value: "100n"
    common: ""
    legs: ["D2", "D4"]

  - kind: diode
    ref: D3
    value: "1N4148"
    legs: ["E2", "E4"]

  - kind: transistor
    ref: Q1
    value: "2N2222"
    legs: ["F3", "F4", "F5"]

  - kind: button
    ref: SW1
    value: "PUSH"
    legs: ["G2", "G3", "H2", "H3"]

  - kind: module
    ref: U1
    label: Arduino Nano
    span: [10, 14]
    pins:
      - { name: "VCC", hole: "A10" }
      - { name: "GND", hole: "A14" }
      - { name: "D2",  hole: "J10" }
      - { name: "D3",  hole: "J14" }

  - kind: power
    ref: PS1
    label: 5V Rail
    span: [17, 20]
    pins:
      - { name: "5V",  hole: "A17" }
      - { name: "GND", hole: "A20" }

  - kind: crystal
    ref: X1
    value: "16MHz"
    legs: ["A6", "A8"]

  - kind: inductor
    ref: L1
    value: "10uH"
    legs: ["B6", "B8"]

  - kind: buzzer
    ref: BZ1
    legs: ["C6", "C8"]       # C6 is the + leg

  - kind: potentiometer
    ref: RV1
    value: "10k"
    legs: ["D6", "D7", "D8"] # D7 is the wiper

  - kind: 7segment
    ref: DS1
    common: cathode
    pins:
      - { name: "a", hole: "F6" }
      - { name: "b", hole: "F9" }
      - { name: "g", hole: "J6" }
      - { name: "dp", hole: "J9" }

  - kind: relay
    ref: K1
    label: RELAY
    span: [21, 24]
    pins:
      - { name: "VCC", hole: "A21" }
      - { name: "GND", hole: "A24" }
      - { name: "NO",  hole: "J21" }
      - { name: "NC",  hole: "J24" }

  - kind: wire
    color: red
    from: "B10"
    to: "T+10"

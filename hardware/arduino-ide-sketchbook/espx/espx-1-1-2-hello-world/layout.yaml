# Breadboard hole-placement layout.
#
# Hole addresses:
#   Main grid : <row><col>  where row is A-J and col is 1..columns
#               (rows A-E = top bank, F-J = bottom bank, separated by the gap;
#               holes sharing a column within one bank are the same node).
#   Rails     : T+<col> / T-<col> / B+<col> / B-<col>  (top/bottom, plus/minus).
#
# Positions below are illustrative of the topology, not traced hole-for-hole
# from the photo. Edit them to match your actual build.

title: ESP32 Hello World breadboard
breadboard:
  columns: 50

components:
  - kind: module
    ref: U1
    label: ESP32-WROOM-32 DevKit
    span: [1, 19]
    pins:
      - { name: "VIN", hole: "B1" }
      - { name: GND, hole: "I19" }
      - { name: GPIO2, hole: "I5" }

  # GPIO2 -> resistor -> LED anode -> LED cathode -> GND rail.
  - kind: wire
    color: green
    from: "J5"
    to: "F25"
  - kind: resistor
    ref: R1
    value: "220"
    legs: ["G25", "G29"]
  - kind: led
    ref: D1
    color: red
    legs: ["F29", "F30"]
  - kind: wire
    color: black
    from: "G30"
    to: "B-30"

  # Module ground to the bottom minus rail (shared ground with the LED cathode).
  - kind: wire
    color: black
    from: "J19"
    to: "B-19"
  - kind: wire
    color: red
    from: "A1"
    to: "T+1"
